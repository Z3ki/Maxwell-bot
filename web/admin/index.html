<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maxwell Admin</title>
<style>
  /* ----- design tokens -----------------------------------------------------*/
  :root{
    --bg:#0a0a0c; --surface:#101015; --panel:#15151c; --panel-2:#1c1c25;
    --line:#22222b; --line-2:#2f2f3a;
    --text:#e8e8ee; --muted:#8a8a96; --dim:#5a5a66;
    --accent:#a78bfa; --accent-2:#7c3aed;
    --green:#7dd87f; --yellow:#e8c87a; --red:#e57585; --blue:#7ab8e8;
    --radius:10px; --radius-sm:6px;
    --shadow:0 1px 0 rgba(255,255,255,.02) inset, 0 8px 24px rgba(0,0,0,.35);
    --mono:"SF Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --font:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  button,input,textarea,select{font:inherit;color:inherit}
  button{cursor:pointer;background:none;border:0}
  a{color:var(--text);text-decoration:none}
  a:hover{color:var(--accent)}
  ::selection{background:rgba(167,139,250,.35)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#25252e;border-radius:8px}
  ::-webkit-scrollbar-thumb:hover{background:#34343f}
  ::-webkit-scrollbar-track{background:transparent}

  /* ----- shell ------------------------------------------------------------*/
  .shell{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  .shell.collapsed{grid-template-columns:64px 1fr}
  .sidebar{background:var(--surface);border-right:1px solid var(--line);padding:18px 12px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:6px;overflow:hidden}
  .brand{display:flex;align-items:center;gap:10px;padding:4px 8px 14px;border-bottom:1px solid var(--line);margin-bottom:10px}
  .brand-mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;font-weight:700;color:#0b0b10;font-size:14px;flex:0 0 auto}
  .brand-text{font-weight:600;letter-spacing:-.01em;font-size:15px;line-height:1.1}
  .brand-text small{display:block;color:var(--muted);font-size:11px;font-weight:500;margin-top:2px}
  .nav-section{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);padding:14px 8px 6px;font-weight:600}
  .nav{display:flex;flex-direction:column;gap:1px}
  .nav button{all:unset;display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);color:var(--muted);font-size:13px;cursor:pointer;white-space:nowrap;overflow:hidden}
  .nav button:hover{background:var(--panel);color:var(--text)}
  .nav button.active{background:var(--panel-2);color:var(--text);box-shadow:inset 0 0 0 1px var(--line-2)}
  .nav .icon{width:18px;height:18px;flex:0 0 auto;display:grid;place-items:center;color:var(--dim)}
  .nav button.active .icon{color:var(--accent)}
  .nav .pill{margin-left:auto;background:var(--panel-2);color:var(--muted);font-size:10px;padding:1px 6px;border-radius:999px}
  .sidebar-foot{margin-top:auto;padding:10px 8px 2px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:6px}
  .sidebar-foot a,.sidebar-foot button{all:unset;display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius-sm);color:var(--muted);font-size:12px;cursor:pointer}
  .sidebar-foot a:hover,.sidebar-foot button:hover{color:var(--text);background:var(--panel)}
  .shell.collapsed .brand-text,.shell.collapsed .nav-section,.shell.collapsed .nav button span:not(.icon),.shell.collapsed .sidebar-foot a span,.shell.collapsed .sidebar-foot button span{display:none}
  .shell.collapsed .nav button{justify-content:center}

  /* ----- main -------------------------------------------------------------*/
  .main{display:flex;flex-direction:column;min-width:0}
  .topbar{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:12px;padding:0 24px;height:60px;background:rgba(10,10,12,.85);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .topbar h1{margin:0;font-size:16px;font-weight:600;letter-spacing:-.01em}
  .topbar h1 small{color:var(--muted);font-weight:500;margin-left:8px;font-size:12px}
  .topbar .spacer{flex:1}
  .topbar .status-strip{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .topbar .search{position:relative}
  .topbar .search input{width:0;padding:7px 10px 7px 30px;background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--text);transition:width .18s,border-color .15s;outline:none}
  .topbar .search input:focus{width:240px;border-color:var(--line-2)}
  .topbar .search input:not(:placeholder-shown){width:240px}
  .topbar .search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--dim)}

  /* ----- generic building blocks ----------------------------------------*/
  .page{padding:24px;max-width:1440px;width:100%;margin:0 auto;flex:1}
  .page h2{font-size:13px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:600;margin:0 0 14px}
  .grid{display:grid;gap:14px}
  .g-1{grid-template-columns:1fr}
  .g-2{grid-template-columns:repeat(2,1fr)}
  .g-3{grid-template-columns:repeat(3,1fr)}
  .g-4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:1180px){.g-3,.g-4{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:780px){.g-2,.g-3,.g-4{grid-template-columns:1fr}}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 12px;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:8px}
  .card h3 .count{margin-left:auto;background:var(--panel-2);color:var(--muted);padding:1px 7px;border-radius:999px;font-size:10px;letter-spacing:0}
  .card .subtle{color:var(--muted);font-size:12px;margin:0 0 12px;line-height:1.55}

  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;display:flex;flex-direction:column;gap:4px;min-width:0}
  .stat .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:600}
  .stat .value{font-size:24px;font-weight:600;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1.1}
  .stat .meta{font-size:11px;color:var(--dim);font-variant-numeric:tabular-nums}
  .stat.ok .value{color:var(--green)}
  .stat.bad .value{color:var(--red)}
  .stat.warn .value{color:var(--yellow)}

  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:8px;font-size:13px;transition:all .12s;white-space:nowrap}
  .btn:hover{border-color:var(--line-2);background:var(--panel)}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--text);color:#0a0a0c;border-color:var(--text);font-weight:500}
  .btn.primary:hover{background:#fff;border-color:#fff}
  .btn.danger{color:var(--red);border-color:rgba(229,117,133,.3)}
  .btn.danger:hover{border-color:var(--red);background:rgba(229,117,133,.08)}
  .btn.ghost{border-color:transparent;color:var(--muted)}
  .btn.ghost:hover{color:var(--text);background:var(--panel);border-color:transparent}
  .btn.sm{padding:5px 9px;font-size:12px}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap}

  .field{display:block;width:100%;background:var(--surface);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:9px 11px;outline:none;transition:border-color .12s,background .12s;font-size:13px}
  .field:focus{border-color:var(--accent);background:var(--bg)}
  textarea.field{min-height:90px;resize:vertical;line-height:1.5}
  .field::placeholder{color:var(--dim)}
  .label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600;margin-bottom:6px;display:block}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .stack{display:flex;flex-direction:column;gap:10px}
  .grow{flex:1;min-width:0}

  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid var(--line);color:var(--muted);font-weight:500;background:var(--surface);letter-spacing:.01em}
  .badge .dot{width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor}
  .badge.ok{color:var(--green);border-color:rgba(125,216,127,.25);background:rgba(125,216,127,.06)}
  .badge.bad{color:var(--red);border-color:rgba(229,117,133,.25);background:rgba(229,117,133,.06)}
  .badge.warn{color:var(--yellow);border-color:rgba(232,200,122,.25);background:rgba(232,200,122,.06)}
  .badge.info{color:var(--blue);border-color:rgba(122,184,232,.25);background:rgba(122,184,232,.06)}
  .badge.accent{color:var(--accent);border-color:rgba(167,139,250,.25);background:rgba(167,139,250,.06)}

  .muted{color:var(--muted)}
  .dim{color:var(--dim)}
  .mono{font-family:var(--mono);font-size:12.5px}
  .truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .divider{height:1px;background:var(--line);margin:14px 0;border:0}

  /* ----- table ------------------------------------------------------------*/
  .table{width:100%;border-collapse:collapse}
  .table th,.table td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line);vertical-align:middle}
  .table th{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:600;background:var(--surface);position:sticky;top:0;z-index:1}
  .table tbody tr:hover{background:rgba(255,255,255,.02)}
  .table tbody tr:last-child td{border-bottom:0}
  .table-wrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;overflow-x:auto}

  /* ----- list items -------------------------------------------------------*/
  .item-list{display:flex;flex-direction:column;gap:8px;max-height:520px;overflow-y:auto;padding-right:4px}
  .item{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:12px 14px;display:flex;gap:12px;align-items:flex-start;transition:border-color .12s}
  .item:hover{border-color:var(--line-2)}
  .item .body{flex:1;min-width:0}
  .item .body p{margin:4px 0 0;color:var(--text);line-height:1.5;word-wrap:break-word}
  .item .body .meta{font-size:11px;color:var(--muted);margin-top:6px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .item .actions{display:flex;gap:6px;flex:0 0 auto}

  /* ----- switch -----------------------------------------------------------*/
  .switch{position:relative;display:inline-block;width:38px;height:22px;flex:0 0 auto}
  .switch input{opacity:0;width:0;height:0}
  .knob{position:absolute;inset:0;background:#26262e;border-radius:999px;cursor:pointer;transition:background .15s}
  .knob:before{content:"";position:absolute;width:16px;height:16px;top:3px;left:3px;background:#7a7a86;border-radius:50%;transition:.15s}
  .switch input:checked+.knob{background:rgba(125,216,127,.3)}
  .switch input:checked+.knob:before{transform:translateX(16px);background:var(--green)}
  .switch-line{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);gap:14px}
  .switch-line:last-child{border-bottom:0}
  .switch-line .text{flex:1;min-width:0}
  .switch-line .text b{display:block;font-size:13px;font-weight:500}
  .switch-line .text small{color:var(--muted);font-size:11.5px;display:block;margin-top:2px}

  /* ----- pre / code blocks (logs, raw) ----------------------------------*/
  pre.log{background:#07070a;border:1px solid var(--line);border-radius:8px;padding:14px;white-space:pre-wrap;max-height:520px;overflow:auto;font-size:12px;line-height:1.55;font-family:var(--mono);color:var(--text);margin:0}

  /* ----- toast -----------------------------------------------------------*/
  .toast-wrap{position:fixed;right:20px;bottom:20px;display:flex;flex-direction:column;gap:8px;z-index:50;pointer-events:none}
  .toast{background:var(--text);color:#0a0a0c;padding:10px 14px;border-radius:8px;font-weight:500;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.4);transform:translateY(8px);opacity:0;transition:.18s;pointer-events:auto;display:flex;align-items:center;gap:8px;min-width:200px;max-width:380px}
  .toast.show{transform:translateY(0);opacity:1}
  .toast.error{background:var(--red);color:#1a0a0e}
  .toast.ok{background:var(--green);color:#0a1a0b}
  .toast .x{margin-left:auto;opacity:.6;cursor:pointer;font-size:16px;line-height:1}

  /* ----- modal -----------------------------------------------------------*/
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
  .modal-bg.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:24px;max-width:480px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.5)}
  .modal h3{margin:0 0 8px;font-size:16px;font-weight:600}
  .modal p{color:var(--muted);margin:0 0 18px;font-size:13px;line-height:1.5}
  .modal .btn-row{justify-content:flex-end}

  /* ----- login -----------------------------------------------------------*/
  .login-wrap{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(ellipse at top,rgba(124,58,237,.08),transparent 60%)}
  .login{width:min(380px,100%);background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:28px;box-shadow:var(--shadow)}
  .login h1{font-size:22px;margin:0 0 4px;font-weight:600;letter-spacing:-.01em}
  .login p{margin:0 0 20px;color:var(--muted);font-size:13px}
  .err{min-height:18px;color:var(--red);font-size:12.5px;margin:4px 0}
  .login .divider{text-align:center;margin:18px 0 12px;color:var(--muted);font-size:11px;position:relative}
  .login .divider:before,.login .divider:after{content:"";position:absolute;top:50%;width:calc(50% - 24px);height:1px;background:var(--line)}
  .login .divider:before{left:0}
  .login .divider:after{right:0}

  /* ----- page-specific styles -------------------------------------------*/
  .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .toolbar .field,.toolbar input,.toolbar select{width:auto;min-width:160px;flex:1;max-width:300px}
  .toolbar .spacer{flex:1}

  .timeline{border-left:2px solid var(--line);padding-left:14px;margin-left:6px}
  .timeline .entry{position:relative;padding:8px 0 14px}
  .timeline .entry:before{content:"";position:absolute;left:-20px;top:12px;width:10px;height:10px;border-radius:50%;background:var(--panel-2);border:2px solid var(--line-2)}
  .timeline .entry.ok:before{background:var(--green);border-color:rgba(125,216,127,.3)}
  .timeline .entry.bad:before{background:var(--red);border-color:rgba(229,117,133,.3)}
  .timeline .entry.warn:before{background:var(--yellow);border-color:rgba(232,200,122,.3)}
  .timeline .entry time{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
  .timeline .entry .what{font-size:13px;margin:2px 0 4px}
  .timeline .entry .who{font-size:12px;color:var(--muted)}

  .empty{text-align:center;padding:30px 20px;color:var(--muted);font-size:13px}
  .empty .icon{font-size:32px;opacity:.4;margin-bottom:8px}

  .kbd{background:var(--surface);border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-family:var(--mono);font-size:11px;color:var(--muted)}

  /* ----- responsive ------------------------------------------------------*/
  .menu-toggle{display:none}
  @media(max-width:980px){
    .shell{grid-template-columns:1fr}
    .sidebar{position:fixed;top:0;left:0;width:240px;height:100vh;z-index:30;transform:translateX(-100%);transition:transform .2s;box-shadow:0 0 30px rgba(0,0,0,.4)}
    .sidebar.open{transform:translateX(0)}
    .menu-toggle{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:8px;font-size:13px}
    .topbar{padding:0 16px;height:54px}
    .page{padding:16px}
    .topbar .search input:focus,.topbar .search input:not(:placeholder-shown){width:160px}
  }
  @media(max-width:520px){
    html,body{font-size:13px}
    .stat .value{font-size:20px}
    .card,.stat{padding:14px}
    .page{padding:12px}
    .field,textarea.field{font-size:16px}
  }

  /* loading shimmer */
  .loading{position:relative;overflow:hidden}
  .loading:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);animation:shimmer 1.4s infinite}
  @keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
</style>
</head>
<body>

<!-- ========================== LOGIN ========================== -->
<div id="login" class="login-wrap">
  <form id="loginForm" class="login">
    <h1>Maxwell Admin</h1>
    <p>Sign in to open the command center.</p>
    <div class="stack">
      <div><input id="user" class="field" autocomplete="username" placeholder="Username"></div>
      <div><input id="pass" class="field" type="password" autocomplete="current-password" placeholder="Password"></div>
      <div id="error" class="err"></div>
      <button class="btn primary" type="submit" style="width:100%">Sign in</button>
      <button id="clear" class="btn ghost" type="button" style="width:100%">Clear saved login</button>
      <div class="divider">or</div>
      <button id="discordLogin" class="btn" type="button" style="width:100%">Continue with Discord</button>
    </div>
  </form>
</div>

<!-- ========================== APP ========================== -->
<div id="app" class="shell" style="display:none">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">M</div>
      <div class="brand-text">Maxwell<small>command center</small></div>
    </div>
    <div class="nav-section">Overview</div>
    <div class="nav" id="nav-primary"></div>
    <div class="nav-section">Knowledge</div>
    <div class="nav" id="nav-knowledge"></div>
    <div class="nav-section">Operations</div>
    <div class="nav" id="nav-ops"></div>
    <div class="sidebar-foot">
      <a href="/"><span>↗</span><span>Main page</span></a>
      <button id="logout"><span>⎋</span><span>Sign out</span></button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle">☰ Menu</button>
      <h1 id="pageTitle">Overview <small id="pageSub"></small></h1>
      <div class="spacer"></div>
      <div class="status-strip" id="statusStrip">
        <span class="badge" id="botBadge"><span class="dot"></span>connecting</span>
        <span class="badge" id="apiBadge"><span class="dot"></span>api</span>
        <span class="badge" id="autoBadge"><span class="dot"></span>auto-refresh</span>
      </div>
      <button class="btn" id="refresh" title="Refresh (R)">↻ Refresh</button>
    </header>
    <main class="page" id="page"></main>
  </div>
</div>

<div class="toast-wrap" id="toasts"></div>
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="modalTitle">Confirm</h3>
    <p id="modalText">Are you sure?</p>
    <div class="btn-row" id="modalActions"></div>
  </div>
</div>

<script>
"use strict";

/* ============================================================ *
 * State
 * ============================================================ */
const S = {
  auth: null,             // {user, pass}
  discordToken: null,
  discordUser: null,
  page: 'overview',
  data: {},
  loading: false,
  pollTimer: null,
  lastLoad: 0,
  filter: '',
};

const PAGES = [
  {id:'overview',  label:'Overview',   section:'primary',  icon:'◐'},
  {id:'commands',  label:'Commands',   section:'primary',  icon:'⌘'},
  {id:'discord',   label:'Discord',    section:'primary',  icon:'◆'},
  {id:'logs',      label:'Logs',       section:'primary',  icon:'☰'},
  {id:'memory',    label:'Memory',     section:'knowledge',icon:'◇'},
  {id:'context',   label:'Context',    section:'knowledge',icon:'☷'},
  {id:'llm',       label:'LLM',        section:'knowledge',icon:'∞'},
  {id:'rem',       label:'REM',        section:'ops',      icon:'⟲'},
  {id:'autonomy',  label:'Autonomy',   section:'ops',      icon:'◇'},
  {id:'intel',     label:'Intel',      section:'ops',      icon:'☉'},
  {id:'cleanup',   label:'Cleanup',    section:'ops',      icon:'✦'},
  {id:'controls',  label:'Controls',   section:'ops',      icon:'⚙'},
  {id:'raw',       label:'Raw JSON',   section:'ops',      icon:'{}'},
];

/* ============================================================ *
 * Tiny helpers
 * ============================================================ */
const $ = sel => document.querySelector(sel);
const $$ = sel => Array.from(document.querySelectorAll(sel));
const el = (tag, attrs={}, children=[]) => {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2), v);
    else if (k === 'html') e.innerHTML = v;
    else if (v === false || v == null) continue;
    else if (v === true) e.setAttribute(k,'');
    else e.setAttribute(k, v);
  }
  (Array.isArray(children) ? children : [children]).filter(Boolean).forEach(c => {
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return e;
};
const esc = v => String(v ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }
const fmtBytes = n => { n = Number(n || 0); if (n < 1024) return n + 'B';
  if (n < 1048576) return (n/1024).toFixed(1) + 'K';
  if (n < 1073741824) return (n/1048576).toFixed(1) + 'M';
  return (n/1073741824).toFixed(1) + 'G'; };
const fmtUptime = ms => { if (!ms) return '-';
  const s = Math.max(0, Math.floor((Date.now() - Number(ms)) / 1000));
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm ' + (s%60) + 's';
  return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm'; };
const fmtAgo = ts => { if (!ts) return 'never';
  const s = Math.max(0, Math.floor((Date.now() - Number(ts)) / 1000));
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago'; };
const fmtTs = ts => { if (!ts) return '-';
  const d = new Date(ts); if (isNaN(d)) return String(ts);
  return d.toISOString().replace('T',' ').slice(0,19) + ' UTC'; };
const fmtTime = ts => { if (!ts) return '-';
  const d = new Date(ts); if (isNaN(d)) return String(ts);
  return d.toTimeString().slice(0,8); };
const fmtNum = n => Number(n || 0).toLocaleString();
const debounce = (fn, ms=300) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; };

/* ============================================================ *
 * Toast + modal
 * ============================================================ */
function toast(msg, kind='') {
  const t = el('div', {class: 'toast ' + kind}, [msg, el('span', {class:'x', onClick: e => e.target.parentNode.remove()}, '×')]);
  $('#toasts').appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 200); }, 3000);
}
function confirmModal(title, text, onYes, opts={}) {
  const m = $('#modal');
  $('#modalTitle').textContent = title;
  $('#modalText').textContent = text;
  const actions = $('#modalActions');
  actions.replaceChildren();
  const no = el('button', {class: 'btn'}, 'Cancel');
  const yes = el('button', {class: 'btn ' + (opts.danger ? 'danger' : 'primary')}, opts.confirm || 'Confirm');
  actions.append(no, yes);
  m.classList.add('show');
  const close = () => m.classList.remove('show');
  no.onclick = close;
  yes.onclick = () => { close(); onYes(); };
}

/* ============================================================ *
 * API
 * ============================================================ */
function authHeaders() {
  if (S.auth) return {'Authorization': 'Basic ' + btoa(S.auth.user + ':' + S.auth.pass)};
  if (S.discordToken) return {'X-Discord-Token': S.discordToken};
  return {};
}
async function api(url, opt={}) {
  const r = await fetch(url, {...opt, headers: {...(opt.headers||{}), ...authHeaders()}});
  let d = {}; try { d = await r.json(); } catch(e) {}
  if (r.status === 401) { logout(false); throw new Error('Unauthorized'); }
  if (!r.ok) throw new Error(d.error || ('HTTP ' + r.status));
  return d;
}

/* ============================================================ *
 * Auth
 * ============================================================ */
async function login(user, pass) {
  const r = await fetch('/api/login', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({user, pass})});
  const d = await r.json().catch(() => ({}));
  if (!r.ok || !d.ok) throw new Error(d.error || 'Login failed');
  S.auth = {user, pass};
  localStorage.setItem('mw_basic', btoa(user + ':' + pass));
  showApp();
}
async function loginDiscord() {
  const d = await api('/api/auth/discord/state');
  if (!d.authorize_url) throw new Error(d.error || 'Discord login not configured');
  // Validate the authorize URL host at the redirect site itself — never trust
  // anything but discord.com / discordapp.com for the OAuth dance.
  const u = d.authorize_url;
  if (!/^https:\/\/(discord\.com|(([a-z0-9-]+\.)?discordapp\.com))\//i.test(u))
    throw new Error('Refusing redirect to unexpected authorize URL');
  window.location.assign(u);
}
async function loginDiscordToken(token) {
  S.discordToken = token;
  localStorage.setItem('mw_discord_token', token);
  try {
    const v = await api('/api/auth/discord/verify');
    if (!v.ok) throw new Error('invalid token');
    S.discordUser = v;
    showApp();
  } catch(e) {
    S.discordToken = null;
    localStorage.removeItem('mw_discord_token');
    throw e;
  }
}
function logout(clear=true) {
  S.auth = null;
  S.discordToken = null;
  S.discordUser = null;
  $('#app').style.display = 'none';
  $('#login').style.display = '';
  if (clear) {
    localStorage.removeItem('mw_basic');
    localStorage.removeItem('mw_discord_token');
    fetch('/api/auth/discord/logout', {method:'POST', headers: S.discordToken?{'X-Discord-Token':S.discordToken}:{}}).catch(()=>{});
  }
}
function showApp() {
  $('#login').style.display = 'none';
  $('#app').style.display = '';
  buildNav();
  setPage('overview');
  loadAll();
  startPolling();
}

function buildNav() {

    PAGES.filter(p => p.section === section).forEach(p => {

/* ============================================================ *
 * Data load
 * ============================================================ */
async function loadAll(silent=false) {
  if (S.loading) return;
  S.loading = true;
  if (!silent) setStatus('autoBadge', 'loading', 'warn');
  try {
    const urls = [
      ['status',     '/api/status'],
      ['system',     '/api/system'],
      ['control',    '/data/bot_control.json'],
      ['memory',     '/data/long_term_memory.json'],
      ['memoryJson', '/data/memory.json'],
      ['context',    '/api/context'],
      ['sites',      '/data/sites.json'],
      ['prompts',    '/data/prompts.json'],
      ['blacklist',  '/data/blacklist.json'],
      ['autoChans',  '/data/auto_channels.json'],
      ['commands',   '/api/commands'],
      ['channels',   '/api/channels'],
      ['discord',    '/api/discord/state'],
      ['rem',        '/api/rem/status'],
      ['remRuns',    '/api/rem/runs'],
      ['autonomy',   '/api/autonomy/status'],
      ['autonomyLog','/api/autonomy/log'],
      ['autonomyGoals','/api/autonomy/goals'],
      ['cleanup',    '/api/context_cleanup/status'],
      ['intel',      '/api/intel/status'],
      ['pm2',        '/api/pm2'],
      ['traces',     '/api/llm/traces?limit=200'],
    ];
    const results = await Promise.allSettled(urls.map(([,u]) => api(u)));
    const data = {};
    urls.forEach(([k], i) => { data[k] = results[i].status === 'fulfilled' ? results[i].value : null; });
    S.data = data;
    S.lastLoad = Date.now();
    setStatus('autoBadge', 'live', 'ok');
    const bot = data.status?.pm2?.bot?.status;
    setStatus('botBadge', bot || 'unknown', bot === 'online' ? 'ok' : 'bad');
    setStatus('apiBadge', 'api ok', 'ok');
    render();
  } catch(e) {
    setStatus('autoBadge', 'error', 'bad');
    toast(e.message, 'error');
  } finally {
    S.loading = false;
  }
}
function startPolling() {
  if (S.pollTimer) clearInterval(S.pollTimer);
  S.pollTimer = setInterval(() => loadAll(true), 15000);
}

function setStatus(id, text, kind='') {
  const e = $('#' + id);
  if (!e) return;
  e.className = 'badge ' + kind;
  e.replaceChildren(el('span', {class:'dot'}), text);
}

 * LLM
 * ============================================================ */
function renderLLM() {
  const page = $('#page');
  const traces = S.data.traces || [];
  const recent = traces.slice(-50);
  const withReason = recent.filter(t => {
    const th = (t.payload && t.payload.thoughts) || '';
    return th && !String(th).includes('no reasoning provided');
  });
  const cov = recent.length ? Math.round(100 * withReason.length / recent.length) : 0;
  const latest = traces[traces.length - 1];

  page.appendChild(el('div', {class:'grid g-3'}, [
    stat(traces.length, 'Total traces', '', ''),
    stat(cov + '%', 'Reasoning coverage', withReason.length + ' / ' + recent.length + ' recent', cov >= 80 ? 'ok' : cov >= 40 ? 'warn' : 'bad'),
    stat(latest?.platform || '-', 'Latest platform', latest?.ts || 'no traces', ''),
  ]));

  const traceList = el('div', {class:'item-list', style:{maxHeight:'640px'}});
  if (!traces.length) traceList.appendChild(el('div', {class:'empty'}, ['No traces yet.']));
  else traces.slice().reverse().slice(0, 80).forEach(t => {
    const p = t.payload || {};
    const th = p.thoughts || '';
    traceList.appendChild(el('div', {class:'item'}, [
      el('div', {class:'body'}, [
        el('div', {class:'row'}, [
          el('span', {class:'badge accent'}, p.tool || 'unknown'),
          el('span', {class:'mono dim'}, t.ts || ''),
          el('span', {class:'mono dim'}, (t.channel_id || '').slice(0,10)),
        ]),
        th ? el('p', {class:'muted', style:{margin:'6px 0 0',whiteSpace:'pre-wrap',fontSize:'12.5px'}}, th.length > 600 ? th.slice(0,600) + '…' : th) : null,
        el('details', {}, [
          el('summary', {class:'muted', style:{cursor:'pointer',fontSize:'11px',marginTop:'4px'}}, 'payload'),
          el('pre', {class:'log', style:{marginTop:'6px',maxHeight:'200px'}}, JSON.stringify(p, null, 2)),
        ]),
      ]),
    ]));
  });
  page.appendChild(el('div', {class:'card', style:{marginTop:'14px'}}, [
    el('h3', {}, ['Recent traces', el('span', {class:'count'}, traces.length)]),
    traceList,
  ]));
}

// extras is an object of {attr: value} pairs to merge into the input.
function switchToggle(on, onChange, extras={}) {
  const id = 'sw_' + Math.random().toString(36).slice(2,8);
  const input = document.createElement('input');
  input.type = 'checkbox';
  input.id = id;
  input.checked = !!on;
  input.addEventListener('change', e => onChange(e.target.checked));
  for (const [k, v] of Object.entries(extras)) input.setAttribute(k, v);
  return el('label', {class:'switch'}, [input, el('span', {class:'knob'})]);
}

            toast('Saved','ok'); loadAll();
          }}, 'Save'),
          el('button', {class:'btn danger sm', onClick: () => confirmModal('Delete memory?', m.content?.slice(0, 100), async () => {
            await api('/api/memory?id=' + encodeURIComponent(m.id), {method:'DELETE'});
            toast('Deleted','ok'); loadAll();
          }, {danger:true, confirm:'Delete'})}, 'Delete'),
        ]),
      ]),
    }),
  }));
}

/* ============================================================ *
 * Context
 * ============================================================ */
function renderContext() {
  const page = $('#page');
  const ctx = S.data.context || [];
  page.appendChild(renderContextAdd());
  page.appendChild(renderFilterableList({
    title: 'Facts',
    items: ctx,
    totalCount: ctx.length,
    placeholder: 'Search facts',
    renderItem: (f) => ({
      title: f.content,
      badges: [
        el('span', {class:'badge'}, f.scope),
        el('span', {class:'badge ' + (f.importance >= 8 ? 'ok' : f.importance >= 5 ? 'warn' : 'bad')}, 'i' + f.importance),
        el('span', {class:'badge ' + (f.visibility === 'private' ? 'warn' : '')}, f.visibility),
      ],
      meta: [{mono: f.id?.slice(0,16) || ''}],
      actions: [el('button', {class:'btn sm danger', onClick: () => confirmModal('Delete fact?', f.content, async () => {
        await api('/api/context?id=' + encodeURIComponent(f.id), {method:'DELETE'});
        toast('Deleted','ok'); loadAll();
      }, {danger:true, confirm:'Delete'})}, 'Delete')],
    }),
  }));
}
function renderContextAdd() {
  return el('div', {class:'card', style:{marginBottom:'14px'}}, [
    el('h3', {}, 'Add fact'),
    el('div', {class:'grid g-3', style:{gap:'10px'}}, [
      el('div', {}, [el('label', {class:'label'}, 'Scope type'), el('select', {class:'field', id:'ctxType', onChange: () => {
        const t = $('#ctxType').value;
        $('#ctxIdWrap').style.display = (t === 'global' || t === 'custom') ? 'none' : '';
        $('#ctxCustomWrap').style.display = t === 'custom' ? '' : 'none';
      }}, [
        el('option', {value:'global'}, 'Global'),
        el('option', {value:'user'}, 'User-specific'),
        el('option', {value:'channel'}, 'Channel-specific'),
        el('option', {value:'guild'}, 'Guild-specific'),
        el('option', {value:'custom'}, 'Custom scope'),
      ])]),
      el('div', {id:'ctxIdWrap'}, [el('label', {class:'label'}, 'Target ID'), el('input', {class:'field', id:'ctxId', placeholder:'ID'})]),
      el('div', {id:'ctxCustomWrap', style:{display:'none'}}, [el('label', {class:'label'}, 'Custom scope name'), el('input', {class:'field', id:'ctxCustom', value:'global'})]),
    ]),
    el('div', {class:'row', style:{marginTop:'10px'}}, [
      el('div', {class:'grow'}, [el('label', {class:'label'}, 'Visibility'), el('select', {class:'field', id:'ctxVis'}, [el('option', {value:'shared'}, 'Shared'), el('option', {value:'private'}, 'Private')])]),
      el('div', {class:'grow'}, [
        el('label', {class:'label'}, 'Importance'),
        (() => {
          const sel = el('select', {class:'field', id:'ctxImp'});
          for (let i = 1; i <= 10; i++) {
            const opt = document.createElement('option');
            opt.value = String(i);
            opt.textContent = 'Importance ' + i + (i === 8 ? ' (High, default)' : '');
            if (i === 8) opt.selected = true;
            sel.appendChild(opt);
          }
          return sel;
        })(),
      ]),
    ]),
    el('div', {style:{marginTop:'10px'}}, [el('label', {class:'label'}, 'Fact'), el('textarea', {class:'field', id:'ctxContent', placeholder:'Fact content'})]),
    el('div', {class:'btn-row', style:{marginTop:'8px'}}, [
      el('button', {class:'btn primary', onClick: async () => {
        const t = $('#ctxType').value;
        let scope = 'global';
        if (t === 'custom') scope = $('#ctxCustom').value.trim() || 'global';
        else if (t !== 'global') {
          const id = $('#ctxId').value.trim();
          if (!id) return toast('Target ID required','error');
          scope = t + ':' + id;
        }
        const content = $('#ctxContent').value.trim();
        if (!content) return toast('Fact content required','error');
        await api('/api/context', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({
          scope, content,
          importance: parseInt($('#ctxImp').value) || 8,
          visibility: $('#ctxVis').value,
          tags: ['manual'],
        })});
        toast('Added','ok'); $('#ctxContent').value=''; loadAll();
      }}, 'Add fact'),
    ]),
  ]);
}

/* ============================================================ *
 * Filterable list (memory + context)
 * ============================================================ */
function renderFilterableList({title, items, totalCount, placeholder, renderItem}) {
  const list = el('div', {class:'item-list'});
  const search = el('input', {class:'field', placeholder: placeholder || 'Filter…', onInput: debounce(e => { S.filter = e.target.value.toLowerCase(); drawList(); }, 200)});
  function drawList() {
    list.replaceChildren();
    const filtered = !S.filter ? items : items.filter(it => JSON.stringify(it).toLowerCase().includes(S.filter));
    const countEl = document.getElementById('listCount_' + title.replace(/\W/g,''));
    if (countEl) countEl.textContent = (S.filter ? filtered.length + ' / ' : '') + totalCount;
    if (!filtered.length) list.appendChild(el('div', {class:'empty'}, [S.filter ? 'No matches.' : 'Nothing here yet.']));
    filtered.forEach(it => {
      const r = renderItem(it);
      const body = el('div', {class:'body'}, [
        el('b', {}, r.title),
        r.badges ? el('div', {style:{display:'flex',gap:'4px',flexWrap:'wrap',marginTop:'4px'}}, r.badges) : null,
        r.meta?.length ? el('div', {class:'meta'}, r.meta.map(m => {
          if (m.mono) return el('span', {class:'mono'}, m.mono);
          return el('span', {}, m.text || '');
        })) : null,
        r.expand ? r.expand : null,
      ]);
      const actions = r.actions?.length ? el('div', {class:'actions'}, r.actions) : null;
      list.appendChild(el('div', {class:'item'}, [body, actions].filter(Boolean)));
    });
  }
  drawList();
  return el('div', {class:'card'}, [
    el('h3', {}, [title, el('span', {class:'count', id: 'listCount_' + title.replace(/\W/g,'')}, totalCount)]),
    el('div', {class:'toolbar'}, [search]),
    list,
  ]);
}

/* ============================================================ *
 * Logs
 * ============================================================ */
function renderLogs() {
  const page = $('#page');
  const sel = el('select', {class:'field', style:{maxWidth:'200px'}}, [el('option', {value:'maxwell-bot'}, 'maxwell-bot'), el('option', {value:'maxwell-api'}, 'maxwell-api')]);
  const out = el('pre', {class:'log'}, 'Pick a process and click Load.');
  const btn = el('button', {class:'btn primary', onClick: async () => {
    btn.disabled = true; out.textContent = 'Loading…';
    try {
      const d = await api('/api/pm2/logs?process=' + encodeURIComponent(sel.value) + '&lines=200');
      out.textContent = d.log || '(empty)';
    } catch(e) { out.textContent = 'Error: ' + e.message; }
    finally { btn.disabled = false; }
  }}, 'Load');
  page.appendChild(el('div', {class:'card'}, [
    el('h3', {}, 'PM2 logs'),
    el('div', {class:'row', style:{marginBottom:'12px'}}, [sel, btn]),
    out,
  ]));
}

/* ============================================================ *
 * Raw JSON
 * ============================================================ */
function renderRaw() {
  const page = $('#page');
  const sections = [
    ['control', 'Control'],
    ['memoryJson', 'Memory (chat)'],
    ['sites', 'Sites'],
    ['prompts', 'Prompts'],
    ['traces', 'LLM traces'],
  ];
  page.appendChild(el('div', {class:'grid g-2'}, sections.map(([k, label]) => {
    return el('div', {class:'card'}, [
      el('h3', {}, label),
      el('pre', {class:'log', style:{maxHeight:'420px'}}, JSON.stringify(S.data[k] ?? '—', null, 2)),
    ]);
  })));
}

/* ============================================================ *
 * Bindings
 * ============================================================ */
$('#loginForm').onsubmit = async e => {
  e.preventDefault();
  $('#error').textContent = '';
  try { await login($('#user').value.trim(), $('#pass').value); }
  catch(err) { $('#error').textContent = err.message; }
};
$('#clear').onclick = () => { $('#user').value=''; $('#pass').value=''; };
$('#logout').onclick = () => logout(true);
$('#refresh').onclick = () => loadAll();
$('#discordLogin').onclick = async () => {
  try { await loginDiscord(); } catch(err) { $('#error').textContent = err.message; }
};
$('#menuToggle').onclick = () => $('#sidebar').classList.toggle('open');

document.addEventListener('keydown', e => {
  // ignore if typing
  if (/input|textarea|select/i.test(e.target.tagName)) return;
  if (e.key === 'r' && !e.ctrlKey && !e.metaKey) { e.preventDefault(); loadAll(); }
  if (e.key === '/') { e.preventDefault(); const s = document.querySelector('.topbar .search input'); if (s) s.focus(); }
});

(async function bootstrap() {
  try {
    const m = location.hash.match(/discord_token=([^&]+)/);
    if (m) {
      history.replaceState(null, '', location.pathname + location.search);
      try { await loginDiscordToken(m[1]); return; }
      catch(err) { $('#error').textContent = err.message; }
    }
    const t = localStorage.getItem('mw_discord_token');
    if (t) { try { await loginDiscordToken(t); return; } catch(e) { localStorage.removeItem('mw_discord_token'); } }
    const b = localStorage.getItem('mw_basic');
    if (b) { try { const [u,p] = atob(b).split(':'); await login(u,p); return; } catch(e) { localStorage.removeItem('mw_basic'); } }
  } catch(e) { /* fall through to login */ }
})();
</script>
